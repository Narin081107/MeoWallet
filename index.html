<header>
  <div class="logo"><span class="logo-dot"></span> FinTrack</div>
  <div class="header-right">
    <div class="user-badge" id="userBadge" style="display:none">
      <span class="avatar" id="userAvatar">?</span>
      <span id="userNameLabel">—</span>
      <button class="logout-btn" onclick="logout()" title="Đăng xuất">⏻</button>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Chuyển đổi chế độ sáng/tối">🌙</button>
  </div>
</header>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-logo"><span class="logo-dot"></span> FinTrack</div>
    <div class="auth-sub">Đăng nhập để quản lý chi tiêu của riêng bạn</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLoginBtn" onclick="switchAuthTab('login')">Đăng Nhập</div>
      <div class="auth-tab" id="tabRegisterBtn" onclick="switchAuthTab('register')">Đăng Ký</div>
    </div>

    <div class="auth-form-panel active" id="loginPanel">
      <div class="form-group">
        <label class="form-label">Tên Đăng Nhập</label>
        <input class="form-input" type="text" id="loginUsername" placeholder="vd: userA" onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()" />
      </div>
      <div class="form-group">
        <label class="form-label">Mật Khẩu</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <div class="auth-error" id="loginError"></div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">Đăng Nhập</button>
    </div>

    <!-- SỬA TẠI ĐÂY: Đồng bộ class ẩn hiện trực quan hơn -->
    <div class="auth-form-panel" id="registerPanel" style="display: none;">
      <div class="form-group">
        <label class="form-label">Tên Đăng Nhập</label>
        <input class="form-input" type="text" id="regUsername" placeholder="vd: userA" />
      </div>
      <div class="form-group">
        <label class="form-label">Mật Khẩu</label>
        <input class="form-input" type="password" id="regPassword" placeholder="Ít nhất 4 ký tự" onkeydown="if(event.key==='Enter')doRegister()" />
      </div>
      <div class="auth-error" id="registerError"></div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">Tạo Tài Khoản</button>
    </div>
  </div>
</div>
